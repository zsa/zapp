name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zapp-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zapp-linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: zapp-windows-x86_64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: zapp-windows-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: zapp-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: zapp-macos-aarch64
          - target: universal-apple-darwin
            os: macos-latest
            artifact: zapp-macos-universal

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        if: matrix.target != 'universal-apple-darwin'
        run: rustup target add ${{ matrix.target }}

      - name: Install Rust toolchain (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        if: matrix.target != 'universal-apple-darwin'
        run: cargo build --release --target ${{ matrix.target }} -p zapp

      - name: Build (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        run: |
          cargo build --release --target x86_64-apple-darwin -p zapp
          cargo build --release --target aarch64-apple-darwin -p zapp
          mkdir -p target/universal
          lipo -create \
            target/x86_64-apple-darwin/release/zapp \
            target/aarch64-apple-darwin/release/zapp \
            -output target/universal/zapp

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Verify signing identity
        if: runner.os == 'macOS'
        run: security find-identity -v -p codesigning $RUNNER_TEMP/signing.keychain-db

      - name: Sign macOS binary
        if: runner.os == 'macOS' && matrix.target != 'universal-apple-darwin'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: ZSA Technology Labs Inc. ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/zapp

      - name: Sign macOS binary (universal)
        if: matrix.target == 'universal-apple-darwin'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: ZSA Technology Labs Inc. ($APPLE_TEAM_ID)" \
            target/universal/zapp

      - name: Notarize macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            BINARY_PATH=target/universal/zapp
          else
            BINARY_PATH=target/${{ matrix.target }}/release/zapp
          fi

          ZIP_PATH=$RUNNER_TEMP/zapp-notarize.zip
          ditto -c -k --keepParent "$BINARY_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Clean up keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db

      - name: Package (unix)
        if: runner.os != 'Windows' && matrix.target != 'universal-apple-darwin'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz zapp
          cd ../../..

      - name: Package (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C target/universal zapp

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/zapp.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
